<!doctype html><html><head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport"><meta name="theme-color" content="#002FA7"><title>AI PM 视界</title><script>// 禁止页面缩放
    document.addEventListener('touchstart', function(event) {
      if (event.touches.length > 1) { event.preventDefault(); }
    }, { passive: false });
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) { event.preventDefault(); }
      lastTouchEnd = now;
    }, { passive: false });</script><script defer="defer" src="/ai-pm-vision-frontend/js/542.js"></script><script defer="defer" src="/ai-pm-vision-frontend/js/app.js"></script><link href="/ai-pm-vision-frontend/css/app.css" rel="stylesheet"></head><body><div id="app"></div></body></html>
